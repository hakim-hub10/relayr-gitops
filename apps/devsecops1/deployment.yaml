apiVersion: apps/v1
kind: Deployment
metadata:
  name: devsecops1
spec:
  replicas: 2

  selector:
    matchLabels:
      app: devsecops1

  template:
    metadata:
      labels:
        app: devsecops1

    spec:
      containers:
      - name: devsecops1
        image: ghcr.io/hakim-hub10/devsecops1:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
