apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devsecops1
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/hakim-hub10/relayr-gitops
    targetRevision: HEAD
    path: apps/devsecops1

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated: {}


metadata:
  annotations:
    argocd-image-updater.argoproj.io/image-list: devsecops1=ghcr.io/hakim-hub10/devsecops1
    argocd-image-updater.argoproj.io/update-strategy: latest
