apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: relayr
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/hakim-hub10/relayr-gitops
    targetRevision: HEAD
    path: apps/relayr

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
